server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Dòng này là quan trọng nhất: Nếu không thấy file ($uri), 
        # hãy thử thư mục ($uri/), nếu vẫn không thấy thì trả về index.html
        try_files $uri $uri/ /index.html;
    }

    # Cấu hình thêm để tránh lỗi cache cho các file tĩnh nếu Duy muốn
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires max;
        add_header Cache-Control "public";
    }
}