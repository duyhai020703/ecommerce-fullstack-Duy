<section class="py-5 bg-white">
  <div class="container-fluid px-5">
    
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
      <h2 class="display-5 fw-bold text-uppercase m-0" style="letter-spacing: 1px;">Hàng Mới Về</h2>
      
      <div class="d-flex flex-wrap gap-2">
        <button (click)="filterByCategory('Quần áo')" 
                [class.active]="currentCategory === 'Quần áo'"
                class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase category-btn">
          Quần áo
        </button>
        
        <button (click)="filterByCategory('Túi')" 
                [class.active]="currentCategory === 'Túi'"
                class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase category-btn">
          Túi
        </button>
        
        <button (click)="filterByCategory('Phụ kiện')" 
                [class.active]="currentCategory === 'Phụ kiện'"
                class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase category-btn">
          Phụ kiện
        </button>
        
        <button (click)="filterByCategory('Giày')" 
                [class.active]="currentCategory === 'Giày'"
                class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase category-btn">
          Giày
        </button>
      </div>
    </div>

    <div class="row g-4">
      @if (filteredItems.length === 0) {
        <div class="col-12 text-center py-5">
          <p class="text-muted fst-italic">Đang cập nhật những xu hướng mới nhất cho {{ currentCategory }}...</p>
        </div>
      }

      @for (p of filteredItems; track p.id) {
        <div class="col-6 col-md-3">
          <app-product-item [product]="p"></app-product-item>
        </div>
      }
    </div>

  </div>
</section>
