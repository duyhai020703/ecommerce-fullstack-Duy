<div class="container-fluid px-4 py-5 mt-4">
  <div class="row">
    <aside class="col-lg-2 d-none d-lg-block">
      <h6 class="fw-bold text-uppercase mb-4">Danh mục</h6>
      <ul class="list-unstyled sidebar-menu">
        <li class="mb-3"><a routerLink="/collections" [queryParams]="{category: ''}" [class.active]="!currentCategory">Tất cả</a></li>
        <li class="mb-3"><a routerLink="/collections" [queryParams]="{category: 'quan-ao'}" [class.active]="currentCategory === 'quan-ao'">Quần áo</a></li>
        <li class="mb-3"><a routerLink="/collections" [queryParams]="{category: 'giay-dep'}" [class.active]="currentCategory === 'giay-dep'">Giày dép</a></li>
        <li class="mb-3"><a routerLink="/collections" [queryParams]="{category: 'tui-vi'}" [class.active]="currentCategory === 'tui-vi'">Túi ví</a></li>
      </ul>
    </aside>

    <main class="col-lg-10 ps-lg-5">
      <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h4 class="fw-bold text-uppercase m-0">{{ categoryTitle }}</h4>
        <span class="text-secondary small">Tìm thấy {{ filteredProducts.length }} sản phẩm</span>
      </div>

      <div class="row g-4">
        <div class="col-6 col-md-4 col-xl-3" *ngFor="let p of filteredProducts">
          <div class="product-card">
            <div class="img-container position-relative overflow-hidden bg-light">
              <img [src]="p.image" class="img-fluid w-100" alt="MLB">
              <div class="hover-btn">
                <button class="btn btn-dark w-100 rounded-0 py-2">THÊM VÀO GIỎ</button>
              </div>
            </div>
            <div class="mt-3">
              <p class="text-secondary x-small mb-1">MLB VIETNAM</p>
              <h6 class="product-name fw-bold">{{ p.name }}</h6>
              <span class="fw-bold">{{ p.price | number:'1.0-0' }}đ</span>
            </div>
          </div>
        </div>

        <div class="col-12 text-center py-5" *ngIf="filteredProducts.length === 0">
          <p class="text-secondary">Không tìm thấy sản phẩm nào trong danh mục này.</p>
        </div>
      </div>
    </main>
  </div>
</div>
