<div class="modal fade" [id]="'quickAddModal-' + product?.id" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content rounded-0 border-0">
      <div class="modal-body p-0">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-3 z-3" data-bs-dismiss="modal"></button>
        
        <div class="row g-0">
          <div class="col-md-6 bg-light d-flex align-items-center justify-content-center p-4">
            <img [src]="product?.imageUrl" class="img-fluid" alt="Product Image">
          </div>

          <div class="col-md-6 p-4">
            <h5 class="fw-bold mb-1">{{ product?.name }}</h5>
            
            <div class="mt-3">
              <p class="small fw-bold mb-2">MÀU SẮC</p>
              <div class="d-flex gap-2">
                 <div class="color-option active border p-1" style="width: 50px; cursor:pointer;">
                   <img [src]="product?.imageUrl" class="img-fluid">
                 </div>
              </div>
            </div>

            <div class="mt-3">
              <p class="small fw-bold mb-2">KÍCH THƯỚC</p>
              <div class="d-flex flex-wrap gap-2">
                <button *ngFor="let v of product?.variants" 
                        class="btn btn-outline-dark btn-sm rounded-0 size-btn"
                        [class.active]="selectedSize === v.size"
                        (click)="selectedSize = v.size">
                  {{ v.size }}
                </button>
              </div>
            </div>

            <div class="mt-4">
              <div class="input-group mb-3 border w-50">
                <button class="btn btn-light border-0" (click)="changeQty(-1)">-</button>
                <input type="text" class="form-control text-center border-0 bg-white" [value]="quantity" readonly>
                <button class="btn btn-light border-0" (click)="changeQty(1)">+</button>
              </div>

              <div class="d-flex gap-2">
                <button class="btn btn-outline-dark w-100 rounded-0 fw-bold py-2" (click)="confirmAdd()">THÊM VÀO GIỎ</button>
                <button class="btn btn-dark w-100 rounded-0 fw-bold py-2">MUA NGAY</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
