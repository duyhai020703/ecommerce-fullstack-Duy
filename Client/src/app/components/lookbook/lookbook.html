<div class="container-fluid px-5 py-4 bg-white">
  <div class="d-flex justify-content-between align-items-center">
    <h2 class="fw-bold text-uppercase m-0" style="letter-spacing: 2px;">Hàng Mới Về</h2>
    
    <div class="d-flex gap-2">
      <button (click)="filterByCategory('Quần áo')" 
              [class.active]="currentCategory === 'Quần áo'"
              class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase">
        Quần áo
      </button>
      <button (click)="filterByCategory('Túi')" 
              [class.active]="currentCategory === 'Túi'"
              class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase">
        Túi
      </button>
      <button (click)="filterByCategory('Phụ kiện')" 
              [class.active]="currentCategory === 'Phụ kiện'"
              class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase">
        Phụ kiện
      </button>
      <button (click)="filterByCategory('Giày')" 
              [class.active]="currentCategory === 'Giày'"
              class="btn btn-sm btn-outline-dark rounded-pill px-4 fw-bold text-uppercase">
        Giày
      </button>
    </div>
  </div>
</div>

<section class="container-fluid px-0 bg-white">
  <div class="row g-0">
    <div class="col-lg-6 position-relative">
      <img src="https://cdn.hstatic.net/files/200000642007/file/shoes_d63f75c167bc4f14ad6498502c7bca93.jpg" 
           class="w-100 h-100 object-fit-cover" 
           style="min-height: 800px;" 
           alt="Model Lookbook">
      
      <div class="overlay position-absolute bottom-0 start-0 w-100 p-5 text-white" 
           style="background: linear-gradient(transparent, rgba(0,0,0,0.7));">
        <h3 class="display-4 fw-bold text-uppercase">New Collection</h3>
        <p class="fs-5 fw-light">Sự kết hợp hoàn hảo giữa cá tính và thời thượng</p>
      </div>
    </div>

    <div class="col-lg-6 bg-light">
      <div class="p-4 p-md-5 h-100 d-flex flex-column justify-content-center">
        
        <div class="row g-4">
          @for (item of filteredItems.slice(0, 4); track item.id) {
            <div class="col-6">
              <app-product-item [product]="item"></app-product-item>
            </div>
          }

          @if (filteredItems.length === 0) {
            <div class="col-12 text-center py-5">
              <p class="text-muted fst-italic">Đang cập nhật sản phẩm cho danh mục "{{ currentCategory }}"...</p>
            </div>
          }
        </div>

      </div>
    </div>
  </div>
</section>
